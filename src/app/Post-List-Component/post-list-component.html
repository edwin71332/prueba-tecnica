<h2>Lista de Publicaciones</h2>
<button [routerLink]="['/posts/new']">Crear Nueva Publicación</button>
<button [routerLink]="['/rick-morty']">Ver Character</button>

<div class="filter-container">
    <label for="status">Filtrar por estado: </label>
    <select id="status" (change)="onFilterChange($event)">
        <option value="all">Todos</option>
        <option value="published">Publicados</option>
        <option value="draft">Borradores</option>
    </select>
</div>

<table>
    <thead>
        <tr>
            <th>Título</th>
            <th>Estado</th>
            <th>Fecha de Creación</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        @for (post of filterPosts(); track post.id) {
        <tr>
            <td>{{ post.title }}</td>
            <td>{{ post.status === 'published' ? 'Publicado' : 'Borrador' }}</td>
            <td>{{ post.createdAt | date:'short' }}</td>
            <td>
                <button [routerLink]="['/posts', post.id]">Editar</button>
                <button (click)="deletePost(post.id)">Eliminar</button>
            </td>
        </tr>
        }
    </tbody>

</table>
