<section class="post-form">
  <h2>Crear publicación</h2>

  <form [formGroup]="postForm">
    <label for="title">Título</label>
    <input id="title" type="text" formControlName="title" placeholder="Escribe el título" />
    <div class="error" *ngIf="title?.invalid && title?.touched">
      <div *ngIf="title?.errors?.['required']">El título es requerido.</div>
      <div *ngIf="title?.errors?.['minlength']">El título debe tener al menos 5 caracteres.</div>
    </div>

    <label for="content">Contenido</label>
    <textarea id="content" formControlName="content" rows="6" placeholder="Escribe el contenido"></textarea>
    <div class="error" *ngIf="content?.invalid && content?.touched">
      <div *ngIf="content?.errors?.['required']">El contenido es requerido.</div>
    </div>

    <div class="meta-row">
      <div>
        <span class="label">Estado actual:</span>
        <strong>{{ postForm.value.status === 'published' ? 'Publicado' : 'Borrador' }}</strong>
      </div>
      <div>
        <span class="label">Fecha:</span>
        <strong>{{ postForm.value.createdAt | date:'short' }}</strong>
      </div>
    </div>

    <div class="actions">
      <button type="button" (click)="saveDraft()">Guardar borrador</button>
      <button type="button" class="publish" (click)="publish()">Publicar</button>
    </div>
  </form>
</section>
