<h2>Lista de Publicaciones</h2>
<button [routerLink]="['/posts/new']">Crear Nueva Publicación</button>
<div class="filter-row">
    <button type="button" (click)="setFilter('all')">Todos</button>
    <button type="button" (click)="setFilter('published')">Publicado</button>
    <button type="button" (click)="setFilter('draft')">Borrador</button>
</div>

<table>
    <thead>
        <tr>
            <th>Título</th>
            <th>Estado</th>
            <th>Fecha de Creación</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let post of filterPosts()">
            <td>{{ post.title }}</td>
            <td>{{ post.status === 'published' ? 'Publicado' : 'Borrador' }}</td>
            <td>{{ post.createdAt | date:'short' }}</td>
            <td>
                <button [routerLink]="['/posts', post.id]">Editar</button>
                <button (click)="deletePost(post.id)">Eliminar</button>
            </td>
        </tr>
    </tbody>

</table>
